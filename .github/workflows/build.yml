name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        run: npm install

      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/android @capacitor/cli

      - name: Create www folder and copy HTML
        run: |
          mkdir -p www
          cp index.html www/index.html

      - name: Add Android Platform
        run: |
          npx cap add android
          npx cap sync android

      - name: Lock Portrait Mode in AndroidManifest
        run: |
          sed -i 's/android:screenOrientation="[^"]*"/android:screenOrientation="portrait"/g' android/app/src/main/AndroidManifest.xml
          grep -q 'screenOrientation' android/app/src/main/AndroidManifest.xml || \
          sed -i 's/<activity/<activity android:screenOrientation="portrait"/g' android/app/src/main/AndroidManifest.xml
          cat android/app/src/main/AndroidManifest.xml

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TechBillPro-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
