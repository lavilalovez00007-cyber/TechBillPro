name: Build TechBill Pro APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android Build Tools
        run: |
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"

      - name: Install Node Dependencies
        run: npm install

      - name: Install Capacitor CLI and Plugins
        run: |
          npm install @capacitor/core @capacitor/android @capacitor/cli

      - name: Create www folder and copy HTML
        run: |
          mkdir -p www
          cp index.html www/index.html

      - name: Initialize Capacitor
        run: |
          npx cap init "TechBill Pro" "com.techbill.app" --web-dir www || true

      - name: Add Android Platform
        run: |
          npx cap add android

      - name: Sync Capacitor
        run: |
          npx cap sync android

      - name: Lock Portrait Mode
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          sed -i 's/android:screenOrientation="[^"]*"/android:screenOrientation="portrait"/g' $MANIFEST
          if ! grep -q 'screenOrientation' $MANIFEST; then
            sed -i 's/<activity/<activity android:screenOrientation="portrait"/g' $MANIFEST
          fi
          echo "--- AndroidManifest.xml ---"
          cat $MANIFEST

      - name: Set App Version
        run: |
          sed -i 's/versionCode [0-9]*/versionCode 1/' android/app/build.gradle
          sed -i 's/versionName "[^"]*"/versionName "1.0.0"/' android/app/build.gradle

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk TechBillPro.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TechBillPro-APK
          path: TechBillPro.apk
          retention-days: 30
